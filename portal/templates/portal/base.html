<!DOCTYPE html>

<html lang="en">

<head>
    {% load static %}
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        rel="stylesheet"
        href="{% static 'portal/css/portal.css' %}"
    >

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        {% block title %}
            Nexavo Customer Portal
        {% endblock %}

    </title>

</head>

<body>

    <header>

        <h1>
            Nexavo Customer Portal
        </h1>

        <hr>

    </header>

    {% include "portal/partials/navbar.html" %}
    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">

                {{ message }}

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}

    {% endif %}


    <main class="container py-4">

        {% block content %}

        {% endblock %}

    </main>


    <hr>

    <footer>

        <p>

            © {% now "Y" %}

            Nexavo Solutions

        </p>

    </footer>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">
    </script>
</body>

</html>
