<!DOCTYPE html>
<html>
<head>
    <title>Delete Client</title>
</head>
<body>

    <h2>Are you sure you want to delete this client?</h2>

    <p><strong>{{ client.name }}</strong> ({{ client.phone }})</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <br>

    <a href="{% url 'client_list' %}">Cancel</a>

</body>
</html>
